name: Export Gradle + Android SDK cache

# One-shot bootstrap: downloads AGP + platform-35 on a GitHub runner (which
# has dl.google.com access), tars them up, and uploads as an artifact. Used
# to prime a sandboxed dev environment that can't reach Google's CDN.
#
# Trigger: manual (workflow_dispatch) only.

on:
  workflow_dispatch:

jobs:
  export-cache:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-35 build-tools;35.0.0 platform-tools'

      - name: Prime Gradle cache
        run: |
          chmod +x ./gradlew
          # Download all deps (AGP, kotlin plugin, libraries). Intentionally
          # skip actual compilation to keep this fast — we just need the
          # maven artifacts populated in ~/.gradle/caches.
          ./gradlew --no-daemon help dependencies :app:dependencies || true
          ./gradlew --no-daemon :app:compileDebugKotlin --dry-run || true

      - name: Package Gradle + SDK caches
        run: |
          set -eux
          mkdir -p /tmp/cache-export
          # Gradle artifact cache (AGP + Kotlin + everything)
          tar -C "$HOME" -czf /tmp/cache-export/gradle-caches.tar.gz .gradle/caches
          # Android SDK platforms + build-tools + platform-tools
          tar -C "$ANDROID_HOME" -czf /tmp/cache-export/android-sdk.tar.gz \
            platforms/android-35 \
            build-tools/35.0.0 \
            platform-tools
          ls -lh /tmp/cache-export/

      - uses: actions/upload-artifact@v4
        with:
          name: offline-cache
          path: /tmp/cache-export/
          retention-days: 7
