name: Android Build

on:
  push:
    branches:
      - main
      - 'claude/**'
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build debug APK & run unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Run unit tests
        run: ./gradlew :app:testDebugUnitTest --stacktrace

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-report
          path: app/build/reports/tests/testDebugUnitTest
          if-no-files-found: ignore

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: safelock-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

  instrumented:
    name: UI tests on emulator (API 33)
    runs-on: ubuntu-latest
    # Authoritative coverage is the `build` job (JVM unit tests) above;
    # Espresso here is a smoke aid for release candidates and feature branches
    # where we need visual/emulator-level proof the app runs end-to-end.
    #
    # Keep `continue-on-error` so an emulator hiccup never blocks shipping.
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/claude/')
    needs: build
    continue-on-error: true
    timeout-minutes: 45

    strategy:
      fail-fast: false
      matrix:
        api-level: [33]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Enable KVM for emulator
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Run instrumented tests + capture live screenshots
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          target: default
          arch: x86_64
          profile: pixel_6
          ram-size: 4096M
          disk-size: 6000M
          # Animations left on are the #1 cause of Espresso flakes on emulator.
          disable-animations: true
          emulator-options: -no-window -no-snapshot -noaudio -no-boot-anim -camera-back none -gpu swiftshader_indirect
          script: |
            set -e
            mkdir -p screenshots

            # 1. Run the full instrumented-test suite (includes the new
            #    EmergencyUninstallNotificationTest which verifies the PIN-gated
            #    uninstall action exists on the ongoing notification).
            ./gradlew :app:connectedDebugAndroidTest --stacktrace || TEST_FAILED=$?

            # 2. Capture live proof the APK installs and launches on a real
            #    Android image. Screenshots are uploaded as an artifact so the
            #    change can be verified visually without a local emulator.
            PKG=com.kiddolock.app

            # App was installed by the test run. Launch the main activity.
            adb shell monkey -p $PKG -c android.intent.category.LAUNCHER 1 || true
            sleep 4
            adb shell screencap -p /sdcard/01_launch.png && adb pull /sdcard/01_launch.png screenshots/

            # Pull the notification shade down to expose the ongoing notification
            # and its new "הסרת חירום" action button.
            adb shell cmd statusbar expand-notifications || true
            sleep 2
            adb shell screencap -p /sdcard/02_notification_shade.png && adb pull /sdcard/02_notification_shade.png screenshots/
            adb shell cmd statusbar collapse || true

            # Dump the active notifications — irrefutable textual proof the
            # uninstall action is attached to the ongoing notification.
            adb shell dumpsys notification --noredact > screenshots/notification_dump.txt || true

            if [ -n "$TEST_FAILED" ]; then
              exit $TEST_FAILED
            fi

      - name: Upload instrumented-test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: instrumented-test-report
          path: app/build/reports/androidTests/connected
          if-no-files-found: ignore

      - name: Upload live-emulator screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: emulator-screenshots
          path: screenshots
          if-no-files-found: ignore
